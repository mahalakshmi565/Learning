<!DOCTYPE html>
<html>
<head>
    <title>Child Selector Practice</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<div class="container">
    <p>Paragraph 1 inside container</p>
    <p>Paragraph 2 inside container</p>

    <section>
        <p>Paragraph inside section</p>
        <span>Span inside section</span>
    </section>

    <div class="box">
        <p>Paragraph inside box</p>
        <p>Another paragraph inside box</p>

        <article>
            <p>Paragraph inside article</p>
        </article>
    </div>

    <p>Paragraph 3 inside container</p>
</div>

<p>Paragraph outside container</p>

</body>
</html>
